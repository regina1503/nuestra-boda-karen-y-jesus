<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Metadatos para compartir en redes sociales -->
    <meta property="og:title" content="Nuestra Boda Jesús & Karla 🩵" />
    <meta property="og:description" content="¡Te invitamos a celebrar nuestro gran día! Haz clic para ver nuestra invitación." />
    <meta property="og:image" content="https://github.com/regina1503/nuestra-boda-karen-y-jesus/raw/main/portadas%20karen%20y.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tu-enlace-aqui.com" />
    
    <title>Nuestra Boda - Jesús y Karla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        .font-great-vibes { font-family: 'Great Vibes', cursive; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .snap-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; scroll-behavior: smooth; }
        .snap-section { scroll-snap-align: start; min-height: 100vh; position: relative; overflow: hidden; }
        
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .overlay { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f1f5f9; transition: opacity 0.5s; }
        .envelope { width: 300px; height: 200px; background: white; border: 1px solid #e2e8f0; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; }
        .seal { width: 80px; height: 80px; background: #B89C23; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Great Vibes', cursive; font-size: 24px; cursor: pointer; border: 4px solid white; box-shadow: 0 0 10px rgba(184, 156, 35, 0.5); transition: 0.3s; }
        .seal:hover { transform: scale(1.05); }

        .audio-player-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 300px; color: #B89C23; }
        .progress-container { width: 100%; height: 2px; background: rgba(184, 156, 35, 0.3); position: relative; cursor: pointer; }
        .progress-bar { height: 100%; background: #B89C23; width: 0%; transition: width 0.1s; }
        .progress-handle { width: 10px; height: 10px; background: #B89C23; border-radius: 50%; position: absolute; top: -4px; left: 0%; }
        .controls { display: flex; align-items: center; gap: 20px; font-size: 20px; margin-top: 10px; color: #B89C23; }
        .main-btn { width: 50px; height: 50px; border: 2px solid #B89C23; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #B89C23; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="overlay" class="overlay">
        <div class="envelope">
            <div class="seal" onclick="abrirInvitacion()">J & K</div>
        </div>
        <p class="mt-8 text-[#B89C23] font-montserrat font-bold">Haz clic en el sello para abrir</p>
    </div>

    <div class="snap-container">
        <!-- 1. Portada -->
        <section class="snap-section w-full flex flex-col justify-start pt-[5vh] items-center text-center bg-cover bg-center reveal" 
                 style="background-image: url('https://raw.githubusercontent.com/regina1503/nuestra-boda-karen-y-jesus/main/Jesus%20y%20Karla%20(3).jpg');">
            <div class="z-10 mt-[20vh]">
                <h1 class="font-montserrat text-sm tracking-[0.475em] uppercase text-gray-900 mb-6">Nuestra Boda</h1>
                <h2 class="font-great-vibes text-6xl md:text-8xl text-[#4377A3] leading-none">Jesús &<br>Karla</h2>
            </div>
        </section>

        <!-- 2. Detalles -->
        <section class="snap-section w-full flex flex-col justify-center items-center text-center bg-cover bg-center reveal"
                 style="background-image: url('https://raw.githubusercontent.com/regina1503/nuestra-boda-karen-y-jesus/main/Jesus%20y%20Karla%20(4).jpg');">
            <div class="z-10 p-6 flex flex-col items-center text-[#4377A3] drop-shadow-lg">
                <h3 class="font-great-vibes text-4xl mb-4">Nuestra canción</h3>
                
                <div class="audio-player-wrapper">
                    <div class="progress-container" onclick="seek(event)">
                        <div id="progress" class="progress-bar"></div>
                        <div id="handle" class="progress-handle"></div>
                    </div>
                    <div class="controls">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#B89C23"><path d="M16 17.01V13h-4v2l-5-3 5-3v2h4V6.99L21 12l-5 5.01zM7 11H5v2h2v-2zM7 7H5v2h2V7z"/></svg>
                        <div class="main-btn" onclick="togglePlay()">
                            <span id="playIcon" style="color: #B89C23; font-size: 20px;">⏸</span>
                        </div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#B89C23"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </div>
                    <audio id="music" ontimeupdate="updateProgress()">
                        <source src="https://github.com/regina1503/nuestra-boda-karen-y-jesus/raw/main/Kany%20Garc%C3%ADa%20-%20Mi%20Plan%20de%20Vida%20(con%20Abel%20Pintos%20-%20Official%20Video).mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </section>

        <!-- 5. Galería -->
        <section class="snap-section w-full min-h-screen flex flex-col justify-center items-center bg-gray-50 p-6 reveal">
            <h2 class="font-great-vibes text-4xl mb-8 text-[#4377A3]">Nuestros momentos</h2>
            <div class="flex flex-col gap-8 w-full max-w-sm">
                <img src="https://raw.githubusercontent.com/regina1503/nuestra-boda-karen-y-jesus/main/WhatsApp%20Image%202026-06-04%20at%209.00.25%20AM.jpeg" class="w-full h-auto object-contain rounded-lg shadow-md">
                <img src="https://raw.githubusercontent.com/regina1503/nuestra-boda-karen-y-jesus/main/WhatsApp%20Image%202026-06-04%20at%209.00.24%20AM.jpeg" class="w-full h-auto object-contain rounded-lg shadow-md">
            </div>
        </section>

        <!-- 8. Asistencia -->
        <section class="snap-section w-full flex flex-col justify-center items-center bg-cover bg-center p-6 text-center reveal"
                 style="background-image: url('https://raw.githubusercontent.com/regina1503/nuestra-boda-karen-y-jesus/main/Jesus%20y%20Karla%20(9.jpg');">
            <div class="absolute inset-0 bg-white/70"></div>
            <div class="relative z-10 w-full max-w-sm flex flex-col items-center -mt-[20vh]">
                <h2 class="font-great-vibes text-4xl mb-8 text-[#4377A3] text-center">Confirmar<br>Asistencia</h2>
                <form id="rsvpForm" class="w-full space-y-4">
                    <input type="text" id="nombre" placeholder="Nombre completo" minlength="8" required class="w-full p-3 border rounded-lg">
                    <button type="button" onclick="enviarWhatsApp()" class="w-full py-4 bg-[#B89C23] text-white rounded-lg font-bold">Enviar a WhatsApp</button>
                </form>
            </div>
        </section>

        <!-- 9. Cierre -->
        <section class="snap-section w-full flex flex-col justify-start items-center p-6 text-center bg-cover bg-center reveal" 
                 style="background-image: url('https://github.com/regina1503/nuestra-boda-karen-y-jesus/raw/main/Jesus%20y%20Karla%20(10.jpg');">
            <div class="relative z-10 flex flex-col items-center mt-[15vh]">
                <h2 class="font-great-vibes text-6xl text-[#B89C23] drop-shadow-md">¡Te esperamos!</h2>
            </div>
        </section>
    </div>

    <script>
        const audio = document.getElementById('music');
        const progress = document.getElementById('progress');
        const handle = document.getElementById('handle');
        const playIcon = document.getElementById('playIcon');

        function abrirInvitacion() {
            document.getElementById('overlay').style.display = 'none';
            audio.currentTime = 5;
            audio.play();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playIcon.innerText = "⏸"; }
            else { audio.pause(); playIcon.innerText = "▶"; }
        }

        function updateProgress() {
            const percent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = percent + "%";
            handle.style.left = percent + "%";
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
